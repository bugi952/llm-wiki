scheduler:
  interval_hours: 6
  timezone: "Asia/Seoul"

filter:
  topic_confidence_threshold: 0.5
  quality_score_threshold: 3.0
  max_content_length_topic: 500
  max_content_length_quality: 1000

wiki:
  archive_after_days: 30
  remove_from_index_after_days: 90
  max_index_items: 50

claude:
  model: "haiku"                        # claude -p --model haiku (Max 구독, API 키 불필요)
  cli_timeout: 120                      # subprocess 타임아웃 (초)

hackernews:
  min_score: 50
  top_n: 100

arxiv:
  categories: ["cs.AI", "cs.CL", "cs.LG"]
  full_text_on_pass: true

sync:
  auto_push: true
  remote: "origin"
  branch: "main"

telegram:
  notify_on_urgent: true
  weekly_report: true
