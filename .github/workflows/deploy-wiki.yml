name: Deploy Wiki to GitHub Pages

on:
  push:
    branches: [main]
    paths: [vault/**]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: |
          git clone --depth 1 https://github.com/jackyzha0/quartz.git /tmp/quartz

      - name: Setup Quartz with our config
        run: |
          cp quartz.config.ts /tmp/quartz/quartz.config.ts
          cp -r vault/* /tmp/quartz/content/

      - name: Install dependencies
        run: npm ci
        working-directory: /tmp/quartz

      - name: Build
        run: npx quartz build
        working-directory: /tmp/quartz

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
